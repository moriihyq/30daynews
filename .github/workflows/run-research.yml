name: Run Last30Days Research
on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic to research'
        required: true
        default: 'AI video tools'
        type: string

jobs:
  research:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install urllib3 requests yt-dlp
        brew install yt-dlp

    - name: Ensure correct API access
      run: |
        mkdir -p ~/.config/last30days
        touch ~/.config/last30days/.env
        echo "BSKY_HANDLE=${{ secrets.BSKY_HANDLE }}" >> ~/.config/last30days/.env
        echo "BSKY_APP_PASSWORD=${{ secrets.BSKY_APP_PASSWORD }}" >> ~/.config/last30days/.env
        echo "SCRAPECREATORS_API_KEY=${{ secrets.SCRAPECREATORS_API_KEY }}" >> ~/.config/last30days/.env
        echo "EXA_API_KEY=${{ secrets.EXA_API_KEY }}" >> ~/.config/last30days/.env
        
    - name: Run last30days script
      env:
        TOPIC: ${{ inputs.topic }}
      run: |
        python run_action.py
        
    - name: Archive report
      uses: actions/upload-artifact@v3
      with:
        name: research-report
        path: ~/.local/share/last30days/out/
